name: ai_story_buddy
description: A kid-friendly AI story narration app with interactive quiz.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # UI Utilities
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  # Placeholder assets (create these in assets/ folder)
  assets:
    - assets/images/
